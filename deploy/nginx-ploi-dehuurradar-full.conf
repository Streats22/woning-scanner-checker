# ═══════════════════════════════════════════════════════════════════════════════
# Volledige Ploi-siteconfig: dehuurradar.nl + Nuxt op /
#
# duplicate location "/" VOORKOMEN (verplicht als nginx -t klaagt):
#   De regel `include .../server/*` laadt vaak NOG een `location / { try_files ... }`.
#   Die moet WEG in die include-bestanden — niet in dit blok een tweede keer toevoegen.
#
#   sudo grep -rn "location /" /etc/nginx/ploi/dehuurradar.nl/server/
#   Open het bestand dat `try_files ... index.php` onder `location /` heeft en verwijder
#   dat hele `location / { ... }` blok (of zet het in commentaar).
#   Daarna: sudo nginx -t && sudo systemctl reload nginx
#
# Nuxt luistert op 127.0.0.1:3000 (PM2). Poort wijzigen? Pas proxy_pass hieronder aan.
# Geen error_page 404 /index.php — breekt Nuxt 404 / client-routes.
# ═══════════════════════════════════════════════════════════════════════════════

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/dehuurradar.nl/before/*;

server {
    listen 80;
    listen [::]:80;

    root /home/ploi/dehuurradar.nl/public;
    server_name dehuurradar.nl dreamy-raccoon-nncbxrzz7r.ploi.ing;

    include /etc/nginx/ssl/dehuurradar.nl;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/nginx/dhparams.pem;

    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Ploi Configuration, do not remove! (bevat soms eigen `location /` — zie header)
    include /etc/nginx/ploi/dehuurradar.nl/server/*;

    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /report {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /up {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /build {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log off;
    error_log  /var/log/nginx/dehuurradar.nl-error.log error;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        try_files $uri /index.php =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_buffers 32 32k;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/dehuurradar.nl/after/*;
