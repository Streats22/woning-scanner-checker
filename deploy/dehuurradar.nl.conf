# ═══════════════════════════════════════════════════════════════════════════════
# Ploi: officiële NGINX-siteconfig voor dehuurradar.nl (repo = bron van waarheid)
# Nuxt (/) + Laravel (/api, /report, …). Plak dit in Ploi → NGINX → hoofdveld
# (≈ /etc/nginx/sites-available/dehuurradar.nl).
# ═══════════════════════════════════════════════════════════════════════════════
#
# ═══════════════════════════════════════════════════════════════════════════════
# 403 op POST /api/analyze (live)? Controleer listen 443 (HTTPS) in Ploi:
# daar moet OOK `location ^~ /api` → PHP staan vóór `location /` → proxy_pass :3000.
# Alleen :80 goed zetten is niet genoeg als :443 alles naar Nuxt stuurt.
# Zie deploy/API-403-HTTPS.txt
# ═══════════════════════════════════════════════════════════════════════════════
#
# Gebruik GEEN `include .../server/*` hier als je hieronder al alle locations hebt:
# die wildcard laadt o.a. server/dehuurradar.nl met nog een `location /` → duplicate.
# Acme-challenge staat hieronder inline.
#
# Geen error_page 404 /index.php (breekt Nuxt). Pas php-fpm-socket aan: ls /run/php/
#
# ── 404 nginx op je telefoon? Vaak: (1) HTTPS-server mist www in server_name → default vhost 404.
#    Zet op :443: server_name dehuurradar.nl www.dehuurradar.nl; (zelfde proxy als hieronder).
#    (2) PM2/Nuxt down → normaal 502; met public/offline.html zie je een vriendelijke pagina (zie
#    location = /offline.html + proxy_intercept_errors hieronder).
# sudo nginx -t && sudo systemctl reload nginx
#
# Let's Encrypt / Ploi — bij 404 op challenge: Certbot-webroot = nginx `root` = …/public
# - Ploi → Web directory: `public`  ⟺  absoluut: /home/ploi/dehuurradar.nl/public
# - NOOIT alleen …/dehuurradar.nl (zonder public): dan schrijft Certbot .well-known naast public
#   en nginx zoekt in public → 404.
# - Controleer: sudo nginx -T | grep -E 'listen (\[::\]:)?80|server_name|acme'
#   Een tweede server{} op :80 met alleen `return 301 https` voor hetzelfde server_name
#   wint soms vóór deze config → LE ziet geen bestand. Zie deploy/PLOI-SSL-STAPPEN.txt
# - Tijdelijk: Force SSL / HTTP→HTTPS redirect in Ploi UIT tot cert er is.
# - Apex: curl http://dehuurradar.nl/.well-known/... → 200 (token zichtbaar).
# - www: 301 naar http://dehuurradar.nl/... is OK — LE volgt redirects voor HTTP-01.
#   Test: curl -L http://www.../acme-challenge/test eindigt op apex met 200.
# ═══════════════════════════════════════════════════════════════════════════════

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/dehuurradar.nl/before/*;

# WWW alleen op poort 80: Let's Encrypt valideert http://www…/.well-known/… zonder 301.
# Redirect alleen voor "/" (niet-acme) naar apex — http i.p.v. https om kip/ei bij eerste cert te vermijden.
# Na werkende SSL kun je hier 301 naar https://dehuurradar.nl zetten.
server {
    listen 80;
    listen [::]:80;
    server_name www.dehuurradar.nl;

    root /home/ploi/dehuurradar.nl/public;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        auth_basic off;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 http://dehuurradar.nl$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;

    root /home/ploi/dehuurradar.nl/public;
    server_name dehuurradar.nl dreamy-raccoon-nncbxrzz7r.ploi.ing;

    include /etc/nginx/ssl/dehuurradar.nl;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/nginx/dhparams.pem;

    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Let's Encrypt — eerst deze location; geen tweede `root` hier (erf server `root` hierboven).
    # Anders dubbele pad-mapping; ^~ wint van regex-locations en vóór location /.
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        auth_basic off;
        default_type "text/plain";
        try_files $uri =404;
    }

    # --- Nuxt + Laravel ---
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /report {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /up {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /build {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Statische fallback als Node (poort 3000) niet reageert — bestand in Laravel public/
    # (repo: public/offline.html). Alleen intern via error_page; niet via proxy.
    location = /offline.html {
        root /home/ploi/dehuurradar.nl/public;
        internal;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    # Cloudflare → origin is vaak HTTP: $scheme = http terwijl de bezoeker HTTPS gebruikt.
    # Nitro gebruikt X-Forwarded-Proto voor absolute URLs (/_nuxt/*.js); zonder fix worden die http://.
    location / {
        set $forwarded_proto $scheme;
        if ($http_x_forwarded_proto != "") {
            set $forwarded_proto $http_x_forwarded_proto;
        }
        proxy_intercept_errors on;
        error_page 502 503 504 /offline.html;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log off;
    error_log  /var/log/nginx/dehuurradar.nl-error.log error;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        try_files $uri /index.php =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_buffers 32 32k;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/dehuurradar.nl/after/*;

# Na SSL: in de Ploi/NGINX-config voor listen 443 hoort server_name ook www.dehuurradar.nl
# (certificaat met SAN voor www + apex). Dit bestand focust op :80 + acme.
