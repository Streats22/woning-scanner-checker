# ─────────────────────────────────────────────────────────────────────────────
# Ploi: Nginx-snippet voor Nuxt (/) + Laravel (/api, /report, …)
# ─────────────────────────────────────────────────────────────────────────────
#
# Dit bestand staat alleen in de repo als referentie.
# Je kopieert de location-blokken hieronder naar Ploi → Site → Nginx-configuratie,
# direct ná:   include /etc/nginx/ploi/<site>/server/*;
#
# NIET doen: include van dit pad op de server — dat bestand bestaat daar niet.
#
# Stappen (kort):
#   1. SSH: grep -r "location /" /etc/nginx/ploi/<site>/server/
#      Staat daar óók location / ? Verwijder die (anders duplicate + nginx -t faalt).
#   2. Verwijder in dezelfde server { } de oude:
#        location / { try_files $uri $uri/ /index.php?$query_string; }
#   3. Verwijder:  error_page 404 /index.php;
#   4. Plak onderstaande location-blokken op de plek van stap 2.
#   5. Zorg dat Nuxt (Nitro) luistert op 127.0.0.1:3000 — zelfde poort als proxy_pass.
#      Voorbeeld: cd .../frontend && npm run build
#               HOST=127.0.0.1 PORT=3000 node .output/server/index.mjs
#      (productie: PM2)
#   6. sudo nginx -t && sudo systemctl reload nginx
#
# Poort aanpassen? Wijzig 3000 in proxy_pass én in je PM2/start-commando.
# ─────────────────────────────────────────────────────────────────────────────

# Laravel — moet vóór location / staan (^~ wint van de prefix-match /)
location ^~ /api {
    try_files $uri $uri/ /index.php?$query_string;
}

location ^~ /report {
    try_files $uri $uri/ /index.php?$query_string;
}

location = /up {
    try_files $uri $uri/ /index.php?$query_string;
}

location ^~ /build {
    try_files $uri $uri/ /index.php?$query_string;
}

location ^~ /storage {
    try_files $uri $uri/ /index.php?$query_string;
}

# Nuxt (Nitro) — alle overige paden
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
