# ─── Ploi: voeg dit toe in de site → Nginx → "Custom configuration" (binnen dezelfde server { } block).
# ─── Pas alleen NUXT_PORT en paden aan als nodig.
#
# Vereist: Nuxt Nitro draait lokaal, bv. PM2:
#   cd {SITE_DIRECTORY}/frontend && HOST=127.0.0.1 PORT=3000 node .output/server/index.mjs
#
# Vervang de bestaande `location / { try_files ... }` door onderstaande structuur,
# OF plak deze location-blokken vóór de algemene `location /` (meer specifieke routes eerst).

# Laravel API + health
location ^~ /api {
    try_files $uri $uri/ /index.php?$query_string;
}

# Laravel gedeelde rapporten + PDF
location ^~ /report {
    try_files $uri $uri/ /index.php?$query_string;
}

# Laravel health (bootstrap)
location = /up {
    try_files $uri $uri/ /index.php?$query_string;
}

# Vite build output (Blade-assets)
location ^~ /build {
    try_files $uri $uri/ /index.php?$query_string;
}

# Storage symlink
location ^~ /storage {
    try_files $uri $uri/ /index.php?$query_string;
}

# Favicon in public (optioneel)
location = /favicon.ico {
    try_files $uri =404;
    access_log off;
    log_not_found off;
}

# Nuxt (homepage, /faq, enz.)
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
