# ═══════════════════════════════════════════════════════════════════════════════
# Ploi: Nuxt (/) + Laravel (/api, /report, …) — één referentiebestand voor de repo
# ═══════════════════════════════════════════════════════════════════════════════
#
# Dit bestand staat alleen in git; kopieer naar Ploi, niet `include` vanaf deze pad.
#
# Problemen die je hiermee voorkomt:
#   • duplicate location "/" — Ploi `include .../server/*` heeft vaak nog
#     `location / { try_files ... index.php }`. Die moet WEG (één `location /`).
#   • error_page 404 /index.php — verwijder die in dezelfde server { }; breekt
#     Nuxt 404 en client-routes.
#
# Checklist:
#   1. ssh: grep -rn "location /" /etc/nginx/ploi/<site>/server/
#   2. Verwijder of comment het oude `location / { try_files ... }` daar.
#   3. Verwijder `error_page 404 /index.php;` als die er staat.
#   4. Plak PART A (alleen locations) ná `include .../server/*`, of gebruik PART B
#      als volledige referentie en pas site-naam/paden aan.
#   5. Nuxt (Nitro) op 127.0.0.1:3000 — zelfde poort als proxy_pass (PM2 in productie).
#   6. sudo nginx -t && sudo systemctl reload nginx
#
# 502 op / of /api: vaak Nuxt niet actief op 3000, of /api per ongeluk naar Node.
#    Zorg dat `^~ /api` vóór `location /` staat (zoals hieronder).
#
# Poort wijzigen? Pas 3000 aan in proxy_pass én in je start/PM2-commando.
# ═══════════════════════════════════════════════════════════════════════════════


# ───────────────────────────────────────────────────────────────────────────────
# PART A — Alleen location-blokken (plak in Ploi → Site → Nginx, ná server-include)
# ───────────────────────────────────────────────────────────────────────────────

# Laravel — moet vóór location / staan (^~ wint van de prefix-match /)
location ^~ /api {
    try_files $uri $uri/ /index.php?$query_string;
}

location ^~ /report {
    try_files $uri $uri/ /index.php?$query_string;
}

location = /up {
    try_files $uri $uri/ /index.php?$query_string;
}

location ^~ /build {
    try_files $uri $uri/ /index.php?$query_string;
}

location ^~ /storage {
    try_files $uri $uri/ /index.php?$query_string;
}

# Nuxt (Nitro) — alle overige paden
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}


